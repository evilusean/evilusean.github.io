<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socratic TriangulaSean</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Socratic TriangulaSean</h1>
        </header>
        
        <main>
            <section id="visualizer">
                <div class="placeholder-box">Triangle Visualization</div>
            </section>

            <section id="ui-controls">
                <button id="generate">Generate Problem</button>
                <button id="screensaver">Screensaver Mode</button>
            </section>

            <section id="dialogue-box">
                <p id="message">Welcome! Ready to solve some triangles?</p>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
